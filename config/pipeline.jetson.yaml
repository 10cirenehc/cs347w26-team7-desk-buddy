# Desk Buddy — Jetson AGX Orin 64GB Configuration
# Copy to config/pipeline.yaml on the Orin, or run with:
#   python -m src.main --config config/pipeline.jetson.yaml

video_source:
  device_id: 0
  width: 640
  height: 480
  fps: 30
  drop_policy: "latest"

person_detector:
  model: "models/yolov8s.pt"       # Change to "models/yolov8s.engine" after TensorRT export
  confidence: 0.25
  device: "cuda:0"                  # GPU inference on Orin
  classes: [0, 67]                  # person + cell phone

tracker:
  iou_threshold: 0.2
  max_lost_frames: 10
  primary_strategy: "largest"
  size_switch_threshold: 1.8

pose_estimator:
  model_complexity: 1
  min_detection_confidence: 0.3
  padding_ratio: 0.3

calibration:
  duration_seconds: 10
  save_path: "data/calibration_profile.json"

posture_classifier:
  type: "logistic"
  model_path: "data/trained_models/posture_model.pkl"
  threshold_fallback: 4.0

posture_cnn:
  model_path: "data/trained_models/posture_cnn.pt"

posture_state:
  ewma_alpha: 0.3
  t_on: 0.65
  t_off: 0.45
  unknown_visibility: 0.3

pipeline:
  detect_every_n: 3

# State logging
state_logger:
  enabled: true
  log_interval_seconds: 1.0
  output_dir: "data/state_logs"
  max_memory_snapshots: 3600

# Voice I/O
voice:
  wake_word:
    phrase: "hey_mycroft"
    sensitivity: 0.5
  stt:
    model: "medium"                 # Upgraded from "small" — Orin has headroom
    language: "en"
  tts:
    voice: "en_US-lessac-medium"
    speed: 1.0

# LLM Agent
agent:
  model: "llama-3.1-8b"
  max_tokens: 150
  temperature: 0.7

# Adaptive alerts
alerts:
  enabled: true
  bad_posture_threshold_seconds: 600
  distraction_threshold_seconds: 300
  positive_reinforcement: true

# Desk control (set enabled: true when BLE desk is available)
desk:
  enabled: false
  sitstand_path: "../sitstand"
  auto_stand_on_bad_posture: true
  nudge_on_prolonged_sitting: true
  sitting_limit_minutes: 60
  standing_limit_minutes: 45
